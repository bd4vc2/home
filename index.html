<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICEY // TACTICAL_OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --aero-cyan: rgba(0, 242, 255, 0.15);
            --dark-void: #010812;
            --v-gold: #ffcc00;
            --hacker-green: #00ff99;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--dark-void);
            color: #c0d1d4;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* FRUTIGER AERO BACKGROUND ELEMENT */
        .aero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(1, 8, 18, 0.8), rgba(1, 8, 18, 0.8)), 
                url('image_5bb41f.jpg') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        .bubbles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; opacity: 0.3;
        }

        /* LOADING SCREEN */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-void);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 1s ease-out;
        }

        .load-box { width: 300px; text-align: center; }
        .progress-container { width: 100%; height: 4px; background: #111; margin: 20px 0; border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); transition: width 0.3s; }
        .load-tip { font-size: 0.7rem; color: var(--v-gold); height: 30px; font-style: italic; }

        /* HUD LAYOUT */
        .hud-header {
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            padding: 10px 30px; border-bottom: 1px solid var(--neon-blue);
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px);
            text-transform: uppercase; position: relative; z-index: 20;
        }

        .dashboard {
            display: grid; grid-template-columns: 320px 1fr 300px; gap: 15px;
            padding: 20px; max-width: 1600px; margin: 0 auto; position: relative; z-index: 20;
            opacity: 0; transform: translateY(20px); transition: 1s all ease;
        }

        .dashboard.ready { opacity: 1; transform: translateY(0); }

        .frame {
            border: 1px solid var(--border-glow); 
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 8px; /* Frutiger touch */
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(0, 242, 255, 0.05);
            transition: transform 0.3s ease;
        }
        
        .frame:hover { transform: scale(1.01); border-color: var(--neon-blue); }

        .frame-header {
            background: linear-gradient(90deg, var(--neon-blue), transparent);
            color: #000; padding: 4px 12px;
            font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold;
            border-radius: 6px 6px 0 0;
        }

        .frame-content { padding: 15px; }

        #log-feed { 
            height: 250px; overflow-y: hidden; font-size: 0.8rem; 
            color: var(--hacker-green); line-height: 1.4;
        }

        .comm-link {
            display: block; background: var(--glass); border: 1px solid var(--neon-blue);
            padding: 12px; margin-bottom: 8px; text-decoration: none; color: #fff;
            font-family: 'Orbitron'; font-size: 0.75rem; text-align: center;
            border-radius: 20px; transition: 0.3s;
        }
        .comm-link:hover { background: var(--neon-blue); color: #000; }

        /* SECRET ADMIN */
        #admin-key { position: fixed; bottom: 0; left: 0; width: 40px; height: 40px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="load-box">
            <div style="font-family: 'Orbitron'; letter-spacing: 5px; color: var(--neon-blue);">ICEY_OS</div>
            <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>
            <div id="tip-display" class="load-tip">Initializing warp drive...</div>
            <div id="load-status" style="font-size: 0.6rem; opacity: 0.5;">MOUNTING_DRIVES</div>
        </div>
    </div>

    <div class="aero-bg"></div>
    <canvas class="bubbles" id="bubbleCanvas"></canvas>

    <header class="hud-header">
        <div style="font-size: 0.7rem; color: var(--v-gold);">BUILD_2.7.0 // STABLE</div>
        <div style="font-family: 'Orbitron'; font-weight: 900; color: var(--neon-blue); letter-spacing: 3px;">ICEY_COMMAND</div>
        <div id="clock" style="text-align: right; font-size: 0.7rem;">00:00:00</div>
    </header>

    <main class="dashboard" id="main-dash">
        <div class="column">
            <div class="frame">
                <div class="frame-header">USER_IDENT</div>
                <div class="frame-content">
                    <p style="font-size: 0.85rem; line-height: 1.6;"><strong>ICEY.</strong> Hardware architect and Subnautica veteran. Powered by a 3080 Ti and pure Montana air. "dm for a cookie" 🍪</p>
                </div>
            </div>
            <div class="frame">
                <div class="frame-header">TELEMETRY</div>
                <div class="frame-content">
                    <div style="display:flex; justify-content:space-between; font-size: 0.8rem; margin-bottom: 5px;">
                        <span>C: STORAGE</span> <span id="c-label" style="color: var(--neon-blue);">90.8 GB</span>
                    </div>
                    <div class="progress-container" style="height: 6px; margin: 5px 0;"><div class="progress-bar" style="width: 82%;"></div></div>
                </div>
            </div>
        </div>

        <div class="column">
            <div class="frame">
                <div class="frame-header">SYSTEM_LOGS</div>
                <div class="frame-content"><div id="log-feed"></div></div>
            </div>
        </div>

        <div class="column">
            <div class="frame">
                <div class="frame-header">COMM_ARRAY</div>
                <div class="frame-content">
                    <a href="https://www.youtube.com/@yeci_.1" class="comm-link">YOUTUBE</a>
                    <a href="https://www.roblox.com/users/4447690823/profile" class="comm-link">ROBLOX</a>
                </div>
            </div>
        </div>
    </main>

    <div id="admin-key" onclick="let p=prompt('ENTER_KEY'); if(p==='icey123') alert('ACCESS_GRANTED');"></div>

<script>
    // 1. LOADING SCREEN LOGIC
    const tips = [
        "Adding more struts...", "Ignoring the Kraken...", "Checking for Reaper Leviathans...",
        "Overclocking the ranch toaster...", "Downloading more cookies...", "Polishing 3080 Ti fins...",
        "Scanning for sub-aquatic life...", "Rerouting power from life support...", "Bypassing Montana firewalls..."
    ];
    
    let progress = 0;
    const pBar = document.getElementById('p-bar');
    const tipDisp = document.getElementById('tip-display');
    const loadInt = setInterval(() => {
        progress += Math.random() * 15;
        if(progress > 100) progress = 100;
        pBar.style.width = progress + "%";
        
        if(Math.random() > 0.7) tipDisp.innerText = tips[Math.floor(Math.random() * tips.length)];

        if(progress === 100) {
            clearInterval(loadInt);
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-dash').classList.add('ready');
            }, 1000);
        }
    }, 400);

    // 2. TERMINAL LOGS
    const feed = document.getElementById('log-feed');
    const hackLogs = [
        "> Initializing BruteForce on Kraken_Mainframe...", "> Bypass successful. Accessing secret cookie storage...",
        "> 3080 Ti Temps: Nominal (42°C).", "> Warning: Time dilation imminent near Gargantua.",
        "> Detecting Peeper migration patterns...", "> Arthur_Morgan_Vibe: STABLE.", "> Adding boosters to boosters..."
    ];
    setInterval(() => {
        const d = document.createElement('div');
        d.innerText = hackLogs[Math.floor(Math.random() * hackLogs.length)];
        feed.appendChild(d);
        if(feed.childNodes.length > 12) feed.removeChild(feed.firstChild);
    }, 2000);

    // 3. CLOCK
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    // 4. BUBBLE ANIMATION (Frutiger Hint)
    const canvas = document.getElementById('bubbleCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let bubbles = [];
    class Bubble {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + 100;
            this.size = Math.random() * 5 + 1;
            this.speed = Math.random() * 1 + 0.5;
        }
        update() { this.y -= this.speed; if(this.y < -50) this.y = canvas.height + 100; }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(0, 242, 255, 0.3)"; ctx.fill();
        }
    }
    for(let i=0; i<30; i++) bubbles.push(new Bubble());
    function anim() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        bubbles.forEach(b => { b.update(); b.draw(); });
        requestAnimationFrame(anim);
    }
    anim();
</script>

</body>
</html>
